name: Test Model Deployment

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ai-scripts/model_deployer.py'
      - '.github/workflows/test_model.yml'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ollama

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama in background
        run: |
          ollama serve &
          sleep 5

      - name: Run model deployer script
        working-directory: ai-scripts/ai-scripts/
        run: |
          python model_deployer.py
