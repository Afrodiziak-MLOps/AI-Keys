name: Train Model

on:
  push:
    branches: [ "main" ]
    paths:
      - 'train.py'
      - '.github/workflows/train_model.yml'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mlflow

      - name: Start MLflow tracking server
        run: |
          mlflow ui --host 0.0.0.0 --port 5001 &
          sleep 5

      - name: Run training
        run: |
          python train.py

      - name: Upload training results
        uses: actions/upload-artifact@v4
        with:
          name: training-results
          path: training_results.txt
